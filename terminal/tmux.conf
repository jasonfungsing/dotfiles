# ~/.tmux.conf — managed in the dotfiles repo (terminal/tmux.conf)
#
#   1. General
#   2. Key bindings
#   3. Copy mode (vi)
#   4. Appearance & status line
#   5. Plugins
#   6. Private / machine-local (tpm init stays at the very bottom)

# ═══ 1. General ═══

# Prefix: C-f instead of the default C-b
set -g prefix C-f

# 256 colours with truecolor override
set -g default-terminal    "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -s escape-time 1             # snappier prefix response
set -g history-limit 10000       # scrollback
set -g base-index 1              # windows number from 1
setw -g pane-base-index 1        # panes number from 1
set -g renumber-windows on       # renumber when a window closes
set-option -g allow-rename off   # keep manually-set window names
set-option -g mouse on
set -g status-interval 5         # redraw status line every 5s

# ═══ 2. Key bindings ═══

# Reload this file
bind-key -N "Reload tmux.conf" r source-file ~/.tmux.conf \; display "tmux.conf RELOADED!"

# Dynamic shortcut sheet: searchable popup of the live bindings — described
# ones first, then the complete raw list (fallback to native list sans fzf)
bind-key -N "Shortcut sheet (searchable)" ? popup -E -w 80% -h 80% "{ tmux list-keys -N -T prefix | sed 's/^/note  /'; tmux list-keys -T prefix | sed -E 's/^bind-key +(-r +)?-T prefix +/all   C-f /'; } | fzf --exact --reverse --no-sort --prompt='tmux keys> ' --bind 'tab:down,btab:up,ctrl-j:ignore,ctrl-k:ignore' --header='tmux shortcut sheet (prefix C-f) — filter, move: Tab / Shift + Tab, Esc closes' > /dev/null || tmux list-keys -N"

# Splits: | vertical, - horizontal
bind -N "Split pane vertically (side by side)" | split-window -h
bind -N "Split pane horizontally (stacked)" - split-window -v

# Vim-style pane navigation
bind -N "Select pane left" h select-pane -L
bind -N "Select pane below" j select-pane -D
bind -N "Select pane above" k select-pane -U
bind -N "Select pane right" l select-pane -R

# Pane resize (pain-control rebinds these with its @pane_resize step)
bind -N "Resize pane left" H resize-pane -L 5
bind -N "Resize pane down" J resize-pane -D 5
bind -N "Resize pane up" K resize-pane -U 5
bind -N "Resize pane right" L resize-pane -R 5

# Move current window left / right
bind-key -r -N "Move window left" < swap-window -t -1
bind-key -r -N "Move window right" > swap-window -t +1

# Window navigation: u previous, o next
bind-key -N "Previous window" u select-window -t :-
bind-key -N "Next window" o select-window -t :+

# Toggle synchronised input across all panes
bind -N "Toggle typing into ALL panes" C-a setw synchronize-panes

# Clear screen and scrollback
bind -n -N "Clear screen and scrollback history" C-k send-keys -R \; send-keys C-l \; clear-history

# ═══ 3. Copy mode (vi) ═══

setw -g mode-keys vi
bind Escape copy-mode

# v selects, y copies to the macOS clipboard, V toggles rectangle
bind-key -Tcopy-mode-vi 'v' send -X begin-selection
bind-key -Tcopy-mode-vi 'y' send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
bind-key -Tcopy-mode-vi V send -X rectangle-toggle
bind-key -Tcopy-mode-vi Escape send -X cancel

unbind-key p
bind-key p paste-buffer

# ═══ 4. Appearance & status line ═══

set-option -g status-position top
# Greyscale status bar (matches the gruvbox-grey zsh prompt and lualine)
set -g status-style fg=colour250,bg=colour237
setw -g window-status-style fg=colour250,bg=colour237
setw -g window-status-current-style fg=colour235,bg=colour246
set -g status-left-length 150

# battery/cpu placeholders are provided by the tmux-battery / tmux-cpu plugins
set -g status-right 'Batt:#{battery_percentage} | CPU:#{cpu_percentage} | %a %d %h %H:%M '

# ═══ 5. Plugins ═══

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'                # plugin manager
set -g @plugin 'tmux-plugins/tmux-sensible'      # sane defaults
set -g @plugin 'tmux-plugins/tmux-resurrect'     # restore sessions after restart
set -g @plugin 'tmux-plugins/tmux-yank'          # copy to system clipboard
set -g @plugin 'tmux-plugins/tmux-copycat'       # enhanced search
set -g @plugin 'tmux-plugins/tmux-open'          # open highlighted file/url
set -g @plugin 'tmux-plugins/tmux-pain-control'  # standard pane bindings
set -g @plugin 'tmux-plugins/tmux-cpu'           # CPU in status line
set -g @plugin 'tmux-plugins/tmux-battery'       # battery in status line

set -g @resurrect-strategy-vim 'session'         # resurrect also restores vim sessions
set-option -g @pane_resize "2"                   # pain-control resize step

# ═══ 6. Private / machine-local (not tracked in git) ═══

if-shell "[ -f ~/.tmux.private ]" "source ~/.tmux.private"

# Initialise tpm (keep at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

# Re-assert -N descriptions on keys that pain-control re-binds during tpm
# load (its bindings win but carry no notes — the shortcut sheets need
# them). Behaviour matches the plugin's bindings exactly.
bind -N "Split pane vertically (side by side)" | split-window -h -c "#{pane_current_path}"
bind -N "Split pane horizontally (stacked)" - split-window -v -c "#{pane_current_path}"
bind -N "Split pane vertically (side by side)" % split-window -h -c "#{pane_current_path}"
bind -N "Split pane horizontally (stacked)" '"' split-window -v -c "#{pane_current_path}"
bind -N "Split pane full width" "\\" split-window -fh -c "#{pane_current_path}"
bind -N "Split pane full height" _ split-window -fv -c "#{pane_current_path}"
bind -N "Select pane left" h select-pane -L
bind -N "Select pane below" j select-pane -D
bind -N "Select pane above" k select-pane -U
bind -N "Select pane right" l select-pane -R
bind -r -N "Resize pane left" H resize-pane -L 2
bind -r -N "Resize pane down" J resize-pane -D 2
bind -r -N "Resize pane up" K resize-pane -U 2
bind -r -N "Resize pane right" L resize-pane -R 2
bind -r -N "Move window left" < swap-window -d -t -1
bind -r -N "Move window right" > swap-window -d -t +1
bind -N "New window (keeps current directory)" c new-window -c "#{pane_current_path}"
